<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Příprava sekce | ŠPORK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#EEECEA;--surface:#FFFFFF;--surface2:#F7F6F3;
  --border:rgba(0,0,0,.08);--border-strong:rgba(0,0,0,.15);
  --text:#1A1916;--text2:#6B6860;--muted:#A8A69F;
  --done:#C4C2BB;--tag:#F0EDE6;--red:#C0392B;--red-light:#FDF0EE;
  --cold:#2A5C3F;--cold-light:#E4F0E8;--cold-mid:#A8D4B4;--cold-dark:#1C3D2A;
  --hot:#8B2E2E;--hot-light:#FDECEA;--hot-mid:#E8A8A8;--hot-dark:#5C1E1E;
  --accent:var(--cold);--accent-light:var(--cold-light);--accent-mid:var(--cold-mid);
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 8px rgba(0,0,0,.04);
  --shadow-md:0 2px 8px rgba(0,0,0,.10),0 1px 3px rgba(0,0,0,.06);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 6rem}

/* SYNC BAR */
.sync-bar{background:var(–surface);border-bottom:1px solid var(–border);padding:.5rem 1rem;display:flex;align-items:center;gap:8px;font-family:‘DM Mono’,monospace;font-size:11px;color:var(–muted);position:sticky;top:0;z-index:100}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(–muted);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:#27AE60}
.sync-dot.err{background:var(–red)}
.sync-dot.loading{background:#E67E22;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* TABS */
.tab-bar{background:var(–surface);border-bottom:2px solid var(–border);padding:0 1rem;display:flex;gap:0;align-items:stretch;max-width:100%;position:sticky;top:33px;z-index:99;box-shadow:var(–shadow)}
.logo-sm{font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:.15em;color:var(–muted);text-transform:uppercase;align-self:center;padding:0 12px 0 0;border-right:1px solid var(–border);margin-right:4px;white-space:nowrap}
.tab-line{display:none}
.tab{font-family:‘DM Sans’,sans-serif;font-size:13px;font-weight:600;letter-spacing:.01em;padding:14px 16px;border:none;border-bottom:3px solid transparent;cursor:pointer;background:none;color:var(–muted);transition:all .2s;margin-bottom:-2px;white-space:nowrap}
.tab.active-cold{color:var(–cold);border-bottom-color:var(–cold);background:var(–cold-light)}
.tab.active-hot{color:var(–hot);border-bottom-color:var(–hot);background:var(–hot-light)}

/* PANELS */
.section-panel{display:none;padding:1rem 0.75rem 0;max-width:700px;margin:0 auto}
.section-panel.visible{display:block}

/* HEADER */
.page-header{margin:0 0 1rem;padding:.75rem 1rem;background:var(–surface);border-radius:14px;box-shadow:var(–shadow);display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:700;line-height:1.2}
.page-sub{font-size:11px;color:var(–text2);margin-top:2px}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.header-btns{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.hbtn{font-family:‘DM Sans’,sans-serif;font-size:11px;font-weight:600;background:var(–surface2);border:1px solid var(–border-strong);border-radius:8px;padding:6px 10px;cursor:pointer;transition:all .15s;color:var(–text2)}
.hbtn:hover{background:var(–tag);color:var(–text)}
.hbtn.active{background:var(–accent);color:#fff;border-color:var(–accent)}
.hbtn.danger{color:var(–red);background:var(–red-light);border-color:rgba(192,57,43,.2)}
.hbtn.dl{color:var(–cold);background:var(–cold-light);border-color:var(–cold-mid)}
.global-stats{font-family:‘DM Mono’,monospace;font-size:11px;color:var(–muted);font-weight:500}

/* SECTION LABELS */
.container{display:flex;flex-direction:column;gap:12px}
.section-wrap{display:flex;flex-direction:column;gap:6px}
.sec-label{font-family:‘DM Mono’,monospace;font-size:10px;font-weight:500;letter-spacing:.12em;color:var(–muted);text-transform:uppercase;padding:10px 4px 6px;border-bottom:2px solid var(–border-strong);display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.sec-label-text{flex:1;outline:none;background:none;border:none;font:inherit;color:inherit;letter-spacing:inherit;text-transform:inherit;min-width:60px}
.sec-label-text:focus{color:var(–text);background:var(–tag);border-radius:3px;padding:1px 4px}
.edit-mode .sec-actions{display:flex;gap:4px}
.sec-actions{display:none}
.sec-btn{font-size:11px;background:var(–red-light);border:1px solid rgba(192,57,43,.2);border-radius:6px;padding:3px 8px;cursor:pointer;color:var(–red);font-family:‘DM Sans’,sans-serif;font-weight:600;transition:all .15s}
.add-dish-btn{display:none;font-family:‘DM Sans’,sans-serif;font-size:12px;font-weight:600;color:var(–accent);background:var(–accent-light);border:1.5px dashed var(–accent-mid);border-radius:10px;padding:10px 14px;cursor:pointer;text-align:center;transition:all .15s}
.edit-mode .add-dish-btn{display:block}

/* CARD */
.card{background:var(–surface);border:1px solid var(–border);border-radius:14px;overflow:hidden;transition:all .2s;box-shadow:var(–shadow)}
.card:active{box-shadow:none;transform:scale(.995)}
.card.complete{border-color:var(–accent-mid);background:var(–accent-light)}
.card.drag-over{border-color:var(–accent);border-width:2px}
.card-header{display:flex;align-items:center;gap:10px;padding:14px 14px 12px;cursor:pointer;user-select:none}
.drag-handle{display:none;flex-shrink:0;cursor:grab;color:var(–muted);font-size:16px;padding:0 2px;line-height:1}
.edit-mode .drag-handle{display:block}
.card-header-left{flex:1;min-width:0}
.dish-name{font-size:15px;font-weight:700;line-height:1.3;outline:none;background:none;border:none;color:var(–text);font-family:inherit;width:100%;cursor:pointer}
.edit-mode .dish-name{cursor:text;border-bottom:1.5px dashed var(–border-strong)}
.dish-name:focus{border-bottom-color:var(–accent);outline:none}
.dish-meta{font-family:‘DM Mono’,monospace;font-size:11px;color:var(–muted);margin-top:3px;outline:none;background:none;border:none;width:100%}
.edit-mode .dish-meta{border-bottom:1px dashed var(–border);cursor:text}
.card-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.progress-pill{font-family:‘DM Mono’,monospace;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(–surface2);color:var(–text2);border:1px solid var(–border);transition:all .2s;white-space:nowrap}
.progress-pill.done-all{background:var(–accent-light);color:var(–accent);border-color:var(–accent-mid)}
.chevron{width:18px;height:18px;color:var(–muted);transition:transform .25s;flex-shrink:0}
.card.open .chevron{transform:rotate(180deg)}
.card-del-btn{display:none;background:var(–red-light);border:1px solid rgba(192,57,43,.2);border-radius:6px;cursor:pointer;color:var(–red);font-size:14px;font-weight:700;line-height:1;padding:4px 7px;transition:all .15s;flex-shrink:0}
.edit-mode .card-del-btn{display:block}

/* PROGRESS BAR */
.progress-bar{height:3px;background:var(–border);margin:0}
.progress-fill{height:100%;background:var(–accent);border-radius:0;transition:width .3s ease}

/* CARD BODY */
.card-body{padding:4px 14px 14px;display:none;border-top:1px solid var(–border)}
.card.open .card-body{display:block}

/* INGREDIENTS */
.ingredients{display:flex;flex-direction:column;gap:0;margin-bottom:10px}
.ing-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(–border)}
.ing-row:last-child{border-bottom:none}
.ing-row.ing-dragging{opacity:.3}
.ing-row.ing-drag-over{border-bottom:2px solid var(–accent)}
.ing-drag-handle{display:none;cursor:grab;color:var(–muted);font-size:14px;flex-shrink:0;padding:0 2px}
.edit-mode .ing-drag-handle{display:block}
.checkbox{width:22px;height:22px;border:2px solid var(–border-strong);border-radius:6px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(–surface)}
.checkbox:active{transform:scale(.9)}
.checkbox.checked{background:var(–accent);border-color:var(–accent)}
.checkbox.checked::after{content:’’;display:block;width:10px;height:6px;border-left:2.5px solid #fff;border-bottom:2.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.ing-label{font-size:14px;color:var(–text);flex:1;line-height:1.4;cursor:pointer;background:none;border:none;font-family:inherit;text-align:left;padding:0;outline:none}
.ing-label.done{text-decoration:line-through;color:var(–done)}
.edit-mode .ing-label{cursor:text;border-bottom:1px dashed transparent}
.edit-mode .ing-label:hover{border-bottom-color:var(–border-strong)}
.ing-label:focus{border-bottom:1px solid var(–accent);outline:none}
.ing-en{font-size:12px;color:var(–muted);font-style:italic}
.ing-del-btn{display:none;background:var(–red-light);border:1px solid rgba(192,57,43,.2);border-radius:5px;cursor:pointer;color:var(–red);font-size:13px;font-weight:700;line-height:1;padding:3px 6px;flex-shrink:0;transition:all .15s}
.edit-mode .ing-del-btn{display:block}
.add-ing-btn{display:none;margin-top:8px;font-family:‘DM Sans’,sans-serif;font-size:12px;font-weight:600;color:var(–accent);background:var(–accent-light);border:1.5px dashed var(–accent-mid);border-radius:8px;padding:8px 10px;cursor:pointer;width:100%;text-align:center;transition:all .15s}
.edit-mode .add-ing-btn{display:block}

/* FOOTER */
.footer-row{display:flex;align-items:flex-start;gap:8px;margin-top:8px}
.comment-input{flex:1;font-family:‘DM Sans’,sans-serif;font-size:13px;color:var(–text);background:var(–surface2);border:1px solid var(–border);border-radius:8px;padding:8px 10px;resize:none;outline:none;min-height:36px;transition:border-color .15s;line-height:1.4}
.comment-input:focus{border-color:var(–accent);background:var(–surface)}
.comment-input::placeholder{color:var(–muted)}
.reset-btn{font-family:‘DM Sans’,sans-serif;font-size:11px;font-weight:600;color:var(–text2);background:var(–surface2);border:1px solid var(–border-strong);border-radius:7px;padding:8px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}

.add-section-wrap{margin:8px 0 0}
.add-section-btn{display:none;font-family:‘DM Sans’,sans-serif;font-size:12px;font-weight:600;color:var(–text2);background:var(–surface);border:1.5px dashed var(–border-strong);border-radius:10px;padding:12px;cursor:pointer;width:100%;text-align:center;transition:all .15s;box-shadow:var(–shadow)}
.show-add-sec .add-section-btn{display:block}
.timestamp{font-family:‘DM Mono’,monospace;font-size:10px;color:var(–muted);text-align:center;margin-top:2rem;letter-spacing:.04em;padding-bottom:1rem}
@media(max-width:480px){
.section-panel{padding:.75rem .75rem 0}
.page-title{font-size:18px}
.tab{font-size:12px;padding:12px 14px}
.dish-name{font-size:14px}
.ing-label{font-size:13px}
}
</style>

</head>

        <button class="hbtn danger" onclick="resetAll('hot')">Resetovat</button>
        <button class="hbtn danger" onclick="factoryReset('hot')">↺ Obnovit</button>

      <div class="global-stats" id="stats-hot">0 / 0 ingrediencí</div>

  <div class="container" id="app-hot"></div>

</div>

    {section:'Hlavní chody masové · Meat mains',dishes:[
      {id:'jehneci',name:'Jehněčí kolínko',meta:'300g',ingredients:['Silná šťáva s bezinkou (rich elderberry jus)','Hrášková kroketa s medvědím česnekem a Fetou (pea croquette, wild garlic, feta)','Grilovaný bílý chřest (grilled white asparagus)','Plochá zelená fazole (flat green beans)','Slaninová drobenka (bacon crumble)']},

    ]}
  ]

// ── STATE ─────────────────────────────────────────────
const menus = {cold:[], hot:[]};
const states = {cold:{}, hot:{}};
const ems = {cold:false, hot:false};
const undoStack = {cold:[], hot:[]};
const UNDO_MAX = 20;
let fbReady = false;
let saveTimeout = null;
let dragTab=null,dragSrcSec=null,dragSrcDish=null,dragSrcIngIdx=null,dragSrcDishId=null;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function saveSnapshot(t){
  undoStack[t].push(JSON.parse(JSON.stringify(menus[t])));
  if(undoStack[t].length>UNDO_MAX)undoStack[t].shift();
  updateUndoBtn(t);
}

function updateUndoBtn(t){
  const btn=document.getElementById('undo-btn-'+t);
  if(!btn)return;
  if(ems[t]&&undoStack[t].length>0){btn.style.display='';btn.textContent='↩ Zpět ('+undoStack[t].length+')';}
  else{btn.style.display='none';}
}

function undo(t){
  if(!undoStack[t].length)return;
  menus[t]=undoStack[t].pop();
  menus[t].forEach(sec=>{sec.id=sec.id||uid();sec.dishes.forEach(d=>{d.id=d.id||uid();});});
  rebuildState(t);saveData(t);render(t);updateUndoBtn(t);
}

function setSyncStatus(status, msg){
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-status');
  dot.className = 'sync-dot ' + status;
  txt.textContent = msg;
}

// ── FIREBASE ──────────────────────────────────────────
function initFirebase(){
  setSyncStatus('loading','Načítám data…');
  // Listen to cold
  window._fbListen('menu/cold', val => {
    if(val){
      menus.cold = val;
      menus.cold.forEach(sec=>{sec.id=sec.id||uid();sec.dishes.forEach(d=>{d.id=d.id||uid();});});
      rebuildState('cold');
      render('cold');
    } else {
      // first time - push defaults
      menus.cold = JSON.parse(JSON.stringify(DEFAULTS.cold));
      rebuildState('cold');
      render('cold');
      window._fbSet('menu/cold', menus.cold);
    }
    setSyncStatus('ok','Synchronizováno · Synced');
  });
  // Listen to hot
  window._fbListen('menu/hot', val => {
    if(val){
      menus.hot = val;
      menus.hot.forEach(sec=>{sec.id=sec.id||uid();sec.dishes.forEach(d=>{d.id=d.id||uid();});});
      rebuildState('hot');
      render('hot');
    } else {
      menus.hot = JSON.parse(JSON.stringify(DEFAULTS.hot));
      rebuildState('hot');
      render('hot');
      window._fbSet('menu/hot', menus.hot);
    }
  });
}

function saveData(t){
  if(!fbReady){
    // fallback to localStorage
    try{localStorage.setItem('spork_offline_'+t, JSON.stringify(menus[t]));}catch(e){}
    return;
  }
  setSyncStatus('loading','Ukládám…');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(()=>{
    window._fbSet('menu/'+t, menus[t])
      .then(()=>setSyncStatus('ok','Uloženo · Saved'))
      .catch(()=>setSyncStatus('err','Chyba uložení · Save error'));
  }, 800); // debounce 800ms
}

// Wait for Firebase
if(window._fbReady){
  fbReady=true; initFirebase();
} else {
  window.addEventListener('fb-ready',()=>{fbReady=true; initFirebase();});
  // Fallback if Firebase doesn't load in 5s
  setTimeout(()=>{
    if(!fbReady){
      setSyncStatus('err','Offline režim · Offline mode');
      ['cold','hot'].forEach(t=>{
        try{
          const s=localStorage.getItem('spork_offline_'+t);
          menus[t]=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULTS[t]));
        }catch(e){menus[t]=JSON.parse(JSON.stringify(DEFAULTS[t]));}
        menus[t].forEach(sec=>{sec.id=sec.id||uid();sec.dishes.forEach(d=>{d.id=d.id||uid();});});
        rebuildState(t); render(t);
      });
    }
  },5000);
}

function rebuildState(t){
  const old=JSON.parse(JSON.stringify(states[t]));
  states[t]={};
  menus[t].forEach(sec=>{sec.dishes.forEach(d=>{
    const o=old[d.id]||{};
    states[t][d.id]={checked:o.checked||{},comment:o.comment||'',open:o.open||false};
    d.ingredients.forEach((_,i)=>{if(states[t][d.id].checked[i]===undefined)states[t][d.id].checked[i]=false;});
  });});
}

function allDishes(t){return menus[t].flatMap(s=>s.dishes);}

function getProgress(t,id,total){
  const n=Object.values(states[t][id]&&states[t][id].checked||{}).filter(Boolean).length;
  return{n,pct:total===0?0:Math.round(n/total*100)};
}

function updateStats(t){
  let tot=0,done=0;
  allDishes(t).forEach(d=>{tot+=d.ingredients.length;done+=Object.values(states[t][d.id]&&states[t][d.id].checked||{}).filter(Boolean).length;});
  document.getElementById('stats-'+t).textContent=done+' / '+tot+' ingrediencí';
}

function updateTimestamp(){
  const n=new Date();
  document.getElementById('timestamp').textContent='Aktualizováno: '+n.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'})+' · '+n.toLocaleDateString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric'});
}

// ── TAB ───────────────────────────────────────────────
function switchTab(t){
  document.getElementById('panel-cold').classList.toggle('visible',t==='cold');
  document.getElementById('panel-hot').classList.toggle('visible',t==='hot');
  document.getElementById('tab-cold').className='tab'+(t==='cold'?' active-cold':'');
  document.getElementById('tab-hot').className='tab'+(t==='hot'?' active-hot':'');
  document.documentElement.style.setProperty('--accent',t==='cold'?'var(--cold)':'var(--hot)');
  document.documentElement.style.setProperty('--accent-light',t==='cold'?'var(--cold-light)':'var(--hot-light)');
  document.documentElement.style.setProperty('--accent-mid',t==='cold'?'var(--cold-mid)':'var(--hot-mid)');
}

// ── BACKUP DOWNLOAD ───────────────────────────────────
function downloadBackup(){
  // Build standalone HTML with current data baked in
  const coldData = JSON.stringify(menus.cold).replace(/\\/g,'\\\\').replace(/`/g,'\\`');
  const hotData  = JSON.stringify(menus.hot).replace(/\\/g,'\\\\').replace(/`/g,'\\`');
  const html = document.documentElement.outerHTML
    .replace('// ── DEFAULT DATA ──────────────────────────────────────',
      '// ── DEFAULT DATA (BACKUP ' + new Date().toLocaleDateString('cs-CZ') + ') ──')
    .replace(/const DEFAULTS = \{[\s\S]*?\};\s*\/\/ ── STATE/,
      'const DEFAULTS = {cold:' + coldData + ',hot:' + hotData + '};\n// ── STATE');
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'spork-zaloha-' + new Date().toISOString().slice(0,10) + '.html';
  a.click();
}

// ── ACTIONS ───────────────────────────────────────────
function factoryReset(t){
  if(!confirm('Obnovit původní data? Všechny úpravy budou ztraceny.'))return;
  saveSnapshot(t);
  menus[t]=JSON.parse(JSON.stringify(DEFAULTS[t]));
  states[t]={};rebuildState(t);saveData(t);render(t);updateUndoBtn(t);
}
function resetAll(t){
  if(!confirm('Resetovat všechny zaškrtnuté položky?'))return;
  allDishes(t).forEach(d=>{d.ingredients.forEach((_,i)=>{states[t][d.id].checked[i]=false;});states[t][d.id].comment='';});
  saveData(t);render(t);
}
function toggleEdit(t){
  ems[t]=!ems[t];
  const btn=document.getElementById('edit-btn-'+t);
  const app=document.getElementById('app-'+t);
  const asw=document.getElementById('asw-'+t);
  if(ems[t]){btn.classList.add('active');btn.textContent='✓ Hotovo';app.classList.add('edit-mode');asw.classList.add('show-add-sec');}
  else{btn.classList.remove('active');btn.textContent='✏️ Upravit';app.classList.remove('edit-mode');asw.classList.remove('show-add-sec');saveData(t);}
  updateUndoBtn(t);
  render(t);
}
function addSection(t){saveSnapshot(t);menus[t].push({id:uid(),section:'Nová sekce',dishes:[]});saveData(t);render(t);updateUndoBtn(t);}
function deleteSection(t,sid){if(!confirm('Smazat sekci?'))return;saveSnapshot(t);menus[t]=menus[t].filter(s=>s.id!==sid);saveData(t);render(t);updateUndoBtn(t);}
function addDish(t,sid){
  const sec=menus[t].find(s=>s.id===sid);if(!sec)return;
  saveSnapshot(t);
  const d={id:uid(),name:'Nové jídlo',meta:'',ingredients:['Ingredience (ingredient)']};
  sec.dishes.push(d);states[t][d.id]={checked:{0:false},comment:'',open:true};
  saveData(t);render(t);updateUndoBtn(t);
}
function deleteDish(t,did){if(!confirm('Smazat jídlo?'))return;saveSnapshot(t);menus[t].forEach(s=>{s.dishes=s.dishes.filter(d=>d.id!==did);});saveData(t);render(t);updateUndoBtn(t);}
function addIng(t,did){
  const d=allDishes(t).find(x=>x.id===did);if(!d)return;
  saveSnapshot(t);
  d.ingredients.push('Nová ingredience (new ingredient)');
  const i=d.ingredients.length-1;states[t][did].checked[i]=false;states[t][did].open=true;
  saveData(t);render(t);updateUndoBtn(t);
  setTimeout(()=>{const rows=document.querySelectorAll('#app-'+t+' [data-dish="'+did+'"] .ing-label');if(rows.length)rows[rows.length-1].focus();},50);
}
function delIng(t,did,idx){
  const d=allDishes(t).find(x=>x.id===did);if(!d)return;
  saveSnapshot(t);
  d.ingredients.splice(idx,1);
  const nc={};d.ingredients.forEach((_,i)=>{nc[i]=states[t][did].checked[i>=idx?i+1:i]||false;});
  states[t][did].checked=nc;saveData(t);render(t);updateUndoBtn(t);
}

// ── DRAG ──────────────────────────────────────────────
function onDishDragStart(e,t,si,di){dragTab=t;dragSrcSec=si;dragSrcDish=di;e.dataTransfer.effectAllowed='move';}
function onDishDrop(e,t,si,di){
  e.preventDefault();if(dragSrcSec===null||dragTab!==t)return;
  const d=menus[t][dragSrcSec].dishes.splice(dragSrcDish,1)[0];menus[t][si].dishes.splice(di,0,d);
  dragSrcSec=null;saveData(t);render(t);
}
function onIngDragStart(e,t,did,idx){dragTab=t;dragSrcDishId=did;dragSrcIngIdx=idx;e.dataTransfer.effectAllowed='move';}
function onIngDrop(e,t,did,idx){
  e.preventDefault();if(dragSrcDishId!==did||dragTab!==t)return;
  const d=allDishes(t).find(x=>x.id===did);
  const mv=d.ingredients.splice(dragSrcIngIdx,1)[0];d.ingredients.splice(idx,0,mv);
  const oc=Object.assign({},states[t][did].checked);
  d.ingredients.forEach((_,i)=>{states[t][did].checked[i]=oc[i]||false;});
  dragSrcIngIdx=null;saveData(t);render(t);
}

function ingLabel(ing){const m=ing.match(/^(.+?)\s*\((.+)\)$/);return m?m[1]+' <span class="ing-en">('+m[2]+')</span>':ing;}

// ── RENDER ────────────────────────────────────────────
function render(t){
  const app=document.getElementById('app-'+t);
  const em=ems[t];
  app.innerHTML='';
  menus[t].forEach((sec,si)=>{
    const wrap=document.createElement('div');wrap.className='section-wrap';
    const lr=document.createElement('div');lr.className='sec-label';
    const lt=document.createElement('span');lt.className='sec-label-text';lt.contentEditable=em?'true':'false';lt.textContent=sec.section;
    lt.oninput=()=>{sec.section=lt.textContent.trim();};lt.onblur=()=>saveData(t);lt.onclick=e=>{if(em)e.stopPropagation();};
    const sa=document.createElement('div');sa.className='sec-actions';
    const dsb=document.createElement('button');dsb.className='sec-btn del';dsb.textContent='× Smazat';dsb.onclick=e=>{e.stopPropagation();deleteSection(t,sec.id);};
    sa.appendChild(dsb);lr.appendChild(lt);lr.appendChild(sa);wrap.appendChild(lr);

    sec.dishes.forEach((dish,di)=>{
      if(!states[t][dish.id])states[t][dish.id]={checked:{},comment:'',open:false};
      const total=dish.ingredients.length;
      const{n,pct}=getProgress(t,dish.id,total);
      const isOpen=states[t][dish.id].open;
      const allDone=n===total&&total>0;

      const card=document.createElement('div');
      card.className='card'+(isOpen?' open':'')+(allDone?' complete':'');
      card.setAttribute('data-dish',dish.id);
      if(em){card.draggable=true;card.ondragstart=e=>onDishDragStart(e,t,si,di);card.ondragover=e=>{e.preventDefault();card.classList.add('drag-over');};card.ondragleave=()=>card.classList.remove('drag-over');card.ondrop=e=>{card.classList.remove('drag-over');onDishDrop(e,t,si,di);};}

      const hdr=document.createElement('div');hdr.className='card-header';
      const dh=document.createElement('span');dh.className='drag-handle';dh.textContent='⠿';
      const left=document.createElement('div');left.className='card-header-left';
      const ne=document.createElement('div');ne.className='dish-name';ne.contentEditable=em?'true':'false';ne.textContent=dish.name;ne.oninput=()=>{dish.name=ne.textContent.trim();};ne.onblur=()=>saveData(t);ne.onclick=e=>{if(em)e.stopPropagation();};
      const me=document.createElement('div');me.className='dish-meta';me.contentEditable=em?'true':'false';me.textContent=dish.meta;me.oninput=()=>{dish.meta=me.textContent.trim();};me.onblur=()=>saveData(t);me.onclick=e=>{if(em)e.stopPropagation();};
      left.appendChild(ne);left.appendChild(me);
      const right=document.createElement('div');right.className='card-header-right';
      const pill=document.createElement('div');pill.className='progress-pill'+(allDone?' done-all':'');pill.textContent=n+'/'+total;
      const db=document.createElement('button');db.className='card-del-btn';db.textContent='×';db.onclick=e=>{e.stopPropagation();deleteDish(t,dish.id);};
      const chv=document.createElementNS('http://www.w3.org/2000/svg','svg');chv.setAttribute('class','chevron');chv.setAttribute('viewBox','0 0 16 16');chv.setAttribute('fill','none');chv.innerHTML='<path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
      right.appendChild(pill);right.appendChild(db);right.appendChild(chv);
      hdr.appendChild(dh);hdr.appendChild(left);hdr.appendChild(right);
      hdr.onclick=e=>{
        if(em){
          const cls = (typeof e.target.className === 'string') ? e.target.className : (e.target.className.baseVal||'');
          if(cls.includes('dish-name')||cls.includes('dish-meta')||cls.includes('card-del-btn')||cls.includes('drag-handle'))return;
        }
        states[t][dish.id].open=!states[t][dish.id].open;render(t);
      };
      card.appendChild(hdr);

      const bar=document.createElement('div');bar.className='progress-bar';
      const fill=document.createElement('div');fill.className='progress-fill';fill.style.width=pct+'%';
      bar.appendChild(fill);card.appendChild(bar);

      const body=document.createElement('div');body.className='card-body';
      const ingList=document.createElement('div');ingList.className='ingredients';

      dish.ingredients.forEach((ing,i)=>{
        const row=document.createElement('div');row.className='ing-row';
        if(em){row.draggable=true;row.ondragstart=e=>{e.stopPropagation();onIngDragStart(e,t,dish.id,i);row.classList.add('ing-dragging');};row.ondragend=()=>row.classList.remove('ing-dragging');row.ondragover=e=>{e.preventDefault();e.stopPropagation();row.classList.add('ing-drag-over');};row.ondragleave=()=>row.classList.remove('ing-drag-over');row.ondrop=e=>{e.stopPropagation();row.classList.remove('ing-drag-over');onIngDrop(e,t,dish.id,i);};}
        const ih=document.createElement('span');ih.className='ing-drag-handle';ih.textContent='⠿';
        const box=document.createElement('div');box.className='checkbox'+(states[t][dish.id].checked[i]?' checked':'');
        const lbl=document.createElement('span');lbl.className='ing-label'+(states[t][dish.id].checked[i]?' done':'');
        if(em){lbl.contentEditable='true';lbl.textContent=ing;lbl.oninput=()=>{dish.ingredients[i]=lbl.textContent.trim();};lbl.onblur=()=>saveData(t);lbl.onclick=e=>e.stopPropagation();}
        else{lbl.innerHTML=ingLabel(ing);lbl.onclick=e=>{e.stopPropagation();states[t][dish.id].checked[i]=!states[t][dish.id].checked[i];saveData(t);render(t);};}
        box.onclick=e=>{e.stopPropagation();if(em)return;states[t][dish.id].checked[i]=!states[t][dish.id].checked[i];saveData(t);render(t);};
        const ingDelBtn=document.createElement('button');ingDelBtn.className='ing-del-btn';ingDelBtn.textContent='×';ingDelBtn.onclick=e=>{e.stopPropagation();delIng(t,dish.id,i);};
        row.appendChild(ih);row.appendChild(box);row.appendChild(lbl);row.appendChild(ingDelBtn);ingList.appendChild(row);
      });

      const aib=document.createElement('button');aib.className='add-ing-btn';aib.textContent='+ Přidat ingredienci';aib.onclick=e=>{e.stopPropagation();addIng(t,dish.id);};
      body.appendChild(ingList);body.appendChild(aib);

      const footer=document.createElement('div');footer.className='footer-row';
      const ta=document.createElement('textarea');ta.className='comment-input';ta.placeholder='Poznámka · Note';ta.rows=1;ta.value=states[t][dish.id].comment;
      ta.oninput=e=>{e.stopPropagation();states[t][dish.id].comment=e.target.value;e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';saveData(t);updateTimestamp();};ta.onclick=e=>e.stopPropagation();
      const rb=document.createElement('button');rb.className='reset-btn';rb.textContent='Reset';rb.onclick=e=>{e.stopPropagation();dish.ingredients.forEach((_,i)=>{states[t][dish.id].checked[i]=false;});states[t][dish.id].comment='';saveData(t);render(t);};
      footer.appendChild(ta);footer.appendChild(rb);body.appendChild(footer);card.appendChild(body);wrap.appendChild(card);
    });

    const adb=document.createElement('button');adb.className='add-dish-btn';adb.textContent='+ Přidat jídlo';adb.onclick=()=>addDish(t,sec.id);
    wrap.appendChild(adb);app.appendChild(wrap);
  });
  updateStats(t);updateTimestamp();
}

switchTab('cold');
</script>
